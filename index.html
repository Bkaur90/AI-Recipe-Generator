    <title>AI Recipe Generator</title>

  </head>
  <body>
    

  <header>
      <h1>AI Recipe Generator Assitant</h1>
    </header>
    <main>
      <form>
        <input
          type="text"
          placeholder="Enter a recipe name"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" value="Generate Recipe" />
      </form>
      <div class="recipe-container">
        <h2>Recipe</h2>
        <p class="recipe-text">steps and process</p>
      </div>
    </main>
