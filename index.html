<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <title>AI Recipe Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Recipe Generator Assitant</h1>
      </header>
      <main>
        <form id="recipe-form">
          <input
            type="text"
            placeholder="Enter a recipe name"
            autofocus
            required
            autocomplete="off"
            id="recipe-input"
          />
          <input type="submit" value="Generate Recipe" id="generate-btn" />
        </form>
        <div class="recipe-container"></div>
      </main>
    </div>
    <footer>
      This AI Project was coded by
      <a
        href="https://www.shecodes.io/graduates/179824-baljeet-kaur"
        target="_blank"
        >Baljeet Kaur</a
      >
      and is open sourced on
      <a href="https://github.com/Bkaur90/AI-Recipe-Generator" target="_blank"
        >GitHub</a
      >
      & hosted on
      <a href="https://airecipegeneratorassitant.netlify.app/" target="_blank"
        >Netlify</a
      >
    </footer>

    <script src="script.js"></script>
  </body>
</html>
